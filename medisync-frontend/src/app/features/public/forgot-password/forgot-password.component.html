<div class="forgot-page">
  <div class="forgot-card">
    <div class="card-logo">
      <i class="ti ti-heartbeat"></i>
      <span>MediSync</span>
    </div>

    <!-- Step 1: Enter Email -->
    <ng-container *ngIf="step === 1">
      <h2>Forgot Password</h2>
      <p class="card-subtitle">Enter your registered email to receive OTP</p>

      <div class="error-message" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="sendOtp()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="ti ti-mail"></i>
            <input type="email" class="form-input" placeholder="Enter your email"
                   [(ngModel)]="email" name="email" required>
          </div>
        </div>
        <button type="submit" class="btn-submit" [disabled]="isLoading">
          {{ isLoading ? 'Sending...' : 'Send OTP' }}
        </button>
      </form>

      <p class="back-link"><a routerLink="/login"><i class="ti ti-arrow-left"></i> Back to Login</a></p>
    </ng-container>

    <!-- Step 2: Enter OTP + New Password -->
    <ng-container *ngIf="step === 2">
      <h2>Reset Password</h2>
      <p class="card-subtitle">{{ otpMessage }}</p>

      <div class="error-message" *ngIf="errorMessage">
        <i class="ti ti-alert-circle"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="resetPassword()">
        <div class="form-group">
          <label class="form-label">OTP Code</label>
          <div class="input-wrapper">
            <i class="ti ti-key"></i>
            <input type="text" class="form-input" placeholder="Enter 6-digit OTP"
                   [(ngModel)]="otp" name="otp" maxlength="6" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrapper">
            <i class="ti ti-lock"></i>
            <input type="password" class="form-input" placeholder="Enter new password"
                   [(ngModel)]="newPassword" name="newPassword" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-wrapper">
            <i class="ti ti-lock"></i>
            <input type="password" class="form-input" placeholder="Confirm new password"
                   [(ngModel)]="confirmPassword" name="confirmPassword" required>
          </div>
        </div>
        <button type="submit" class="btn-submit" [disabled]="isLoading">
          {{ isLoading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>

      <p class="back-link"><a (click)="step = 1" style="cursor:pointer"><i class="ti ti-arrow-left"></i> Change email</a></p>
    </ng-container>

    <!-- Step 3: Success -->
    <ng-container *ngIf="step === 3">
      <div class="success-section">
        <div class="success-icon">
          <i class="ti ti-circle-check"></i>
        </div>
        <h2>Password Reset Successful!</h2>
        <p>Your password has been changed. You can now login with your new password.</p>
        <a routerLink="/login" class="btn-submit" style="display:block; text-align:center; text-decoration:none; margin-top:24px;">Back to Login</a>
      </div>
    </ng-container>
  </div>
</div>
